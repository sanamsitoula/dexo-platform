# =============================================================================
#  Dexo v5 — NGINX reverse proxy config
# =============================================================================
#  Routes by hostname → port. Wildcard DNS catches all tenant subdomains.
#  Place at: infra/nginx/dexo.conf and include from nginx.conf
# =============================================================================

# Upstream definitions
upstream dexo_api           { server 127.0.0.1:4000; }
upstream dexo_platform_web  { server 127.0.0.1:3001; }
upstream dexo_platform_admin{ server 127.0.0.1:3002; }
upstream dexo_tenant_website{ server 127.0.0.1:4005; }
upstream dexo_tenant_admin  { server 127.0.0.1:4006; }
upstream dexo_tenant_app    { server 127.0.0.1:4007; }

# Wildcard SSL cert for *.dexo.com + apex
ssl_certificate     /etc/letsencrypt/live/dexo.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/dexo.com/privkey.pem;

# Force HTTPS
server {
    listen 80;
    server_name dexo.com *.dexo.com;
    return 301 https://$host$request_uri;
}

# ---- Platform marketing (dexo.com, www.dexo.com) ----
server {
    listen 443 ssl http2;
    server_name dexo.com www.dexo.com;

    location / {
        proxy_pass http://dexo_platform_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Platform admin (admin.dexo.com) ----
server {
    listen 443 ssl http2;
    server_name admin.dexo.com;

    location / {
        proxy_pass http://dexo_platform_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- API (api.dexo.com) ----
server {
    listen 443 ssl http2;
    server_name api.dexo.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://dexo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Tenant public websites (*.dexo.com, except admin.* and portal.*) ----
# Falls back to DB lookup for custom domains (no Host rewrite needed)
server {
    listen 443 ssl http2 default_server;
    server_name ~^(?<tenant>[^.]+)\.dexo\.com$;

    # Exclude admin.* and portal.* (handled by their own servers)
    location / {
        # If path starts with admin./portal., reject (should be caught above)
        if ($tenant ~ "^admin$")  { return 444; }
        if ($tenant ~ "^portal$") { return 444; }

        proxy_pass http://dexo_tenant_website;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Slug $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Tenant admin (admin.*.dexo.com) ----
server {
    listen 443 ssl http2;
    server_name ~^admin\.(?<tenant>[^.]+)\.dexo\.com$;

    location / {
        proxy_pass http://dexo_tenant_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Slug $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Tenant customer app (portal.*.dexo.com) ----
server {
    listen 443 ssl http2;
    server_name ~^portal\.(?<tenant>[^.]+)\.dexo\.com$;

    location / {
        proxy_pass http://dexo_tenant_app;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Slug $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Custom verified domains → tenant-website (DB lookup by NGINX/lua not in scope) ----
# In production use Traefik with file provider that reads custom domains from
# TenantLifecycle.customDomain and provisions dynamic routers.
# Alternatively, configure wildcard catch-all that proxies to API for resolution.
