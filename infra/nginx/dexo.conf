    ssl_certificate     /etc/letsencrypt/live/dexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
