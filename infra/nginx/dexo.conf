# =============================================================================
# OneDexo — Production nginx (host + path-based routing)
#
# DYNAMIC BY DESIGN — no per-tenant edits are ever needed for platform
# subdomains: the single tenant wildcard block below matches EVERY current
# and future tenant (<tenant>.onedexo.com) automatically the moment a tenant
# is provisioned, and dispatches to tenant-admin/tenant-app/tenant-website by
# PATH (/admin, /portal, else website) rather than by a second hostname
# label. This is deliberate: admin.<tenant>.onedexo.com / portal.<tenant>.
# onedexo.com are second-level wildcards that plain `*.onedexo.com` Let's
# Encrypt certs do NOT cover (a CA won't issue `*.*.onedexo.com`); path
# routing keeps every tenant surface one label deep, so a single
# `*.onedexo.com` wildcard cert covers all of it — no Cloudflare Advanced
# Certificate Manager or per-tenant DNS-01 automation required.
#
# Custom domains (fitness.com → tenant) are served by the default_server
# fallback below (the app resolves the tenant from the Host header via
# /api/tenants/resolve). Per-domain SSL certs are the only thing that needs a
# config fragment — those are generated per tenant into:
#
#     /etc/nginx/dexo-tenants/<slug>.conf
#
# by  scripts/nginx-tenant-sync.ts  (run it after verifying a custom domain,
# or on a cron). Regenerating one tenant's fragment + `nginx -s reload` is a
# graceful partial rebuild — no other tenant's config is touched.
#
# Prerequisites:
#   1. Wildcard DNS:  *.onedexo.com  A  <SERVER_IP>
#                     onedexo.com    A  <SERVER_IP>
#      One level is all that's needed — admin/portal are paths, not hosts.
#   2. Wildcard SSL cert (DNS-01 via Certbot + Cloudflare plugin, or any
#      ACME client that supports DNS-01):
#        sudo certbot certonly --dns-cloudflare \
#          --dns-cloudflare-credentials ~/.secrets/cloudflare.ini \
#          -d onedexo.com -d "*.onedexo.com"
#   3. Install:
#        sudo mkdir -p /etc/nginx/dexo-tenants
#        sudo cp infra/nginx/dexo.conf /etc/nginx/sites-available/dexo.conf
#        sudo rm -f /etc/nginx/sites-enabled/default
#        sudo ln -sf /etc/nginx/sites-available/dexo.conf /etc/nginx/sites-enabled/dexo.conf
#        sudo nginx -t && sudo systemctl reload nginx
#
# URL map (production):
#   onedexo.com / www.onedexo.com       → Platform Web   (:3001)
#   admin.onedexo.com                   → Platform Admin (:3002)
#   api.onedexo.com                     → API + Swagger  (:4000)
#   <tenant>.onedexo.com                → Tenant Website (:4005)
#   <tenant>.onedexo.com/admin          → Tenant Admin   (:4006, basePath '/admin')
#   <tenant>.onedexo.com/portal         → Tenant App     (:4007, basePath '/portal')
#   <custom-domain>                     → Tenant Website (default_server fallback)
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Upstreams ──────────────────────────────────────────────────────────────
upstream dexo_api            { server 127.0.0.1:4000; keepalive 32; }
upstream dexo_platform_web   { server 127.0.0.1:3001; keepalive 16; }
upstream dexo_platform_admin { server 127.0.0.1:3002; keepalive 16; }
upstream dexo_tenant_website { server 127.0.0.1:4005; keepalive 16; }
upstream dexo_tenant_admin   { server 127.0.0.1:4006; keepalive 16; }
upstream dexo_tenant_app     { server 127.0.0.1:4007; keepalive 16; }
upstream dexo_chatwoot       { server 127.0.0.1:3200; keepalive 16; }

# ── Force HTTPS ────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    # ACME HTTP-01 challenges for custom-domain certs must stay on :80
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── Platform Web (onedexo.com, www.onedexo.com) ────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name onedexo.com www.onedexo.com;

    ssl_certificate     /etc/letsencrypt/live/onedexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onedexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://dexo_platform_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── Platform Admin (admin.onedexo.com) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.onedexo.com;

    ssl_certificate     /etc/letsencrypt/live/onedexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onedexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://dexo_platform_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── API + Swagger (api.onedexo.com) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.onedexo.com;

    ssl_certificate     /etc/letsencrypt/live/onedexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onedexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://dexo_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── Chatwoot (chatwoot.onedexo.com) ────────────────────────────────────────
# Exact hostnames always win over the regex tenant wildcard below regardless
# of file order, but this is declared up here with the other exact-hostname
# blocks for clarity. Without this block "chatwoot" was being captured by
# the `~^(?<tenant>[a-z0-9-]+)\.onedexo\.com$` wildcard as if it were a
# tenant subdomain, proxying to tenant-website instead of Chatwoot itself.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chatwoot.onedexo.com;

    ssl_certificate     /etc/letsencrypt/live/onedexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onedexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://dexo_chatwoot;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── Tenant surfaces (<tenant>.onedexo.com) — single dynamic wildcard ───────
# Path-based routing: /admin -> tenant-admin, /portal -> tenant-app, else
# tenant-website. One label deep, so the *.onedexo.com wildcard cert covers
# every tenant and every surface — no second-level wildcard or per-tenant
# cert automation needed for admin/portal (see docs/CUSTOM_DOMAINS.md).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<tenant>[a-z0-9-]+)\.onedexo\.com$;

    ssl_certificate     /etc/letsencrypt/live/onedexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onedexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location /admin/ {
        proxy_pass         http://dexo_tenant_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Tenant-Slug     $tenant;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /portal/ {
        proxy_pass         http://dexo_tenant_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Tenant-Slug     $tenant;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location / {
        proxy_pass         http://dexo_tenant_website;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Tenant-Slug     $tenant;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── Per-tenant custom-domain fragments (generated) ─────────────────────────
# scripts/nginx-tenant-sync.ts writes one file per verified custom domain
# into this directory (server block + its own Let's Encrypt cert). Only the
# affected fragment changes when a tenant adds/removes a domain.
include /etc/nginx/dexo-tenants/*.conf;

# ── Custom-domain fallback (default_server) ────────────────────────────────
# Any host that matches nothing above (a tenant's custom domain before its
# fragment/cert exists) is served by the tenant-website, which resolves the
# tenant from the Host header via /api/tenants/resolve. Uses the platform
# cert, so browsers will warn until the per-domain fragment is generated —
# generate fragments promptly after domain verification.
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/onedexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onedexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://dexo_tenant_website;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}
