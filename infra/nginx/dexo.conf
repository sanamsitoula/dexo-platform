# =============================================================================
# Dexo v5 — Production nginx (host-based routing)
#
# Prerequisites:
#   1. Wildcard DNS:  *.dexo.com  A  <SERVER_IP>
#                     dexo.com    A  <SERVER_IP>
#   2. Wildcard SSL cert (DNS-01 challenge via Certbot + Cloudflare plugin):
#        sudo certbot certonly --dns-cloudflare \
#          --dns-cloudflare-credentials ~/.secrets/cloudflare.ini \
#          -d dexo.com -d "*.dexo.com"
#   3. Install:
#        sudo cp infra/nginx/dexo.conf /etc/nginx/sites-available/dexo.conf
#        sudo rm -f /etc/nginx/sites-enabled/default
#        sudo ln -sf /etc/nginx/sites-available/dexo.conf /etc/nginx/sites-enabled/dexo.conf
#        sudo nginx -t && sudo systemctl reload nginx
#
# URL map (production):
#   dexo.com / www.dexo.com          → Platform Web        (:3001)
#   admin.dexo.com                   → Platform Admin      (:3002)
#   api.dexo.com                     → API + Swagger       (:4000)
#   <tenant>.dexo.com                → Tenant Website      (:4005)
#   admin.<tenant>.dexo.com          → Tenant Admin        (:4006)
#   portal.<tenant>.dexo.com         → Tenant App          (:4007)
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Upstreams ──────────────────────────────────────────────────────────────
upstream dexo_api            { server 127.0.0.1:4000; keepalive 32; }
upstream dexo_platform_web   { server 127.0.0.1:3001; keepalive 16; }
upstream dexo_platform_admin { server 127.0.0.1:3002; keepalive 16; }
upstream dexo_tenant_website { server 127.0.0.1:4005; keepalive 16; }
upstream dexo_tenant_admin   { server 127.0.0.1:4006; keepalive 16; }
upstream dexo_tenant_app     { server 127.0.0.1:4007; keepalive 16; }

# ── Force HTTPS ────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dexo.com *.dexo.com;
    return 301 https://$host$request_uri;
}

# ── Shared SSL / proxy snippet (defined via variables, repeated per server) ─
# ssl_certificate and ssl_certificate_key must be inside each SSL server block.

# ── Platform Web (dexo.com, www.dexo.com) ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dexo.com www.dexo.com;

    ssl_certificate     /etc/letsencrypt/live/dexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://dexo_platform_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── Platform Admin (admin.dexo.com) ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.dexo.com;

    ssl_certificate     /etc/letsencrypt/live/dexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
