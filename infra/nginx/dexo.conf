# ── Tenant Public Website (<tenant>.onedexo.com) — dynamic wildcard ────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<tenant>[a-z0-9-]+)\.onedexo\.com$;

