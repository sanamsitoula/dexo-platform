# ── Tenant Admin (admin.<tenant>.dexo.com) ────────────────────────────────
# Must be declared BEFORE the generic tenant wildcard below.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^admin\.(?<tenant>[a-z0-9-]+)\.dexo\.com$;

    ssl_certificate     /etc/letsencrypt/live/dexo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://dexo_tenant_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Tenant-Slug     $tenant;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

