# =============================================================================
# DEXO — Nginx reverse proxy (HOST-based routing)
#
# Why host-based and not /dexo path prefixes: the Next.js apps serve assets
# from root paths (/_next/..., /favicon.ico). Path-prefix routing would need a
# basePath rebuild of every app and still breaks host-based tenant resolution
# (bishnufit.onedexo.com). Host routing matches production exactly.
#
# Install (Linux / WSL):
#   sudo cp deploy/nginx/dexo.conf /etc/nginx/sites-available/dexo.conf
#   sudo ln -s /etc/nginx/sites-available/dexo.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Local domains: point them at 127.0.0.1 in your hosts file, e.g.
#   127.0.0.1 onedexo.com admin.onedexo.com api.onedexo.com
#   127.0.0.1 bishnufit.onedexo.com admin.bishnufit.onedexo.com portal.bishnufit.onedexo.com
# (Or just use the built-in *.localhost URLs without nginx at all — see
#  docs/LOCAL-DEV-URLS.md.)
#
# ngrok: `ngrok http 80` in front of this. One free ngrok URL = ONE hostname,
# so subdomain routing can't apply through the tunnel — for tunnel demos use
# the ?tenant=<slug> override built into the tenant apps (see the docs).
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Shared proxy settings
# (kept inline per location for clarity; Host must be forwarded unchanged —
#  it is what the API and the tenant middlewares resolve tenants from.)

# ----------------------------- Platform ------------------------------------

server {
    listen 80;
    server_name onedexo.com www.onedexo.com onedexo.localhost;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name admin.onedexo.com admin.onedexo.localhost;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name api.onedexo.com api.onedexo.localhost;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    # Swagger lives at /api/docs on the API itself: http://api.onedexo.com/api/docs
}

# ------------------------- Tenant surfaces (wildcard) -----------------------
# Order matters: more specific server_names win over the generic wildcard.

# admin.<tenant>.onedexo.com → Tenant Admin portal (:4006)
server {
    listen 80;
    server_name ~^admin\.(?<tenant>[a-z0-9-]+)\.onedexo\.(com|localhost)$;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:4006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# portal.<tenant>.onedexo.com → Customer app (:4007)
server {
