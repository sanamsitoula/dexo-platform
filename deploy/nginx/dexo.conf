# =============================================================================
# DEXO — Nginx reverse proxy (host + path-based routing)
#
# Tenant surfaces are one host, dispatched by path: <tenant>.onedexo.com for
# the public site, /admin for tenant-admin, /portal for tenant-app (each app
# is built with the matching Next.js basePath). This keeps every tenant
# surface a single subdomain level deep, so one `*.onedexo.com` wildcard
# cert covers all of it — admin.<tenant>.*/portal.<tenant>.* would be
# second-level wildcards that plain Let's Encrypt certs can't cover.
#
# Install (Linux / WSL):
#   sudo cp deploy/nginx/dexo.conf /etc/nginx/sites-available/dexo.conf
#   sudo ln -s /etc/nginx/sites-available/dexo.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Local domains: point them at 127.0.0.1 in your hosts file, e.g.
#   127.0.0.1 onedexo.com admin.onedexo.com api.onedexo.com
#   127.0.0.1 bishnufit.onedexo.com
# (Or just use the built-in *.localhost URLs without nginx at all — see
#  docs/LOCAL-DEV-URLS.md.)
#
# ngrok: `ngrok http 80` in front of this. One free ngrok URL = ONE hostname,
# so subdomain routing can't apply through the tunnel — for tunnel demos use
# the ?tenant=<slug> override built into the tenant apps (see the docs).
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Shared proxy settings
# (kept inline per location for clarity; Host must be forwarded unchanged —
#  it is what the API and the tenant middlewares resolve tenants from.)

# ----------------------------- Platform ------------------------------------

server {
    listen 80;
    server_name onedexo.com www.onedexo.com onedexo.localhost;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name admin.onedexo.com admin.onedexo.localhost;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name api.onedexo.com api.onedexo.localhost;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    # Swagger lives at /api/docs on the API itself: http://api.onedexo.com/api/docs
}

# ------------------------- Tenant surfaces (wildcard) -----------------------
# One wildcard host, dispatched by path: /admin -> tenant-admin (:4006),
# /portal -> tenant-app (:4007), else tenant-website (:4005).
server {
    listen 80;
    server_name ~^(?<tenant>[a-z0-9-]+)\.onedexo\.(com|localhost)$;
    client_max_body_size 100M;

    location /admin/ {
        proxy_pass http://127.0.0.1:4006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /portal/ {
        proxy_pass http://127.0.0.1:4007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        proxy_pass http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
