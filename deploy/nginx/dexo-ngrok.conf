# =============================================================================
# Dexo — Path-based nginx config (ngrok / single-URL demo)
#
# Use this when you need ONE public URL for all apps (e.g. free ngrok).
# Requires ENABLE_PATH_ROUTING=true in .env so Next.js apps set their basePath.
#
# Install:
#   sudo cp deploy/nginx/dexo-ngrok.conf /etc/nginx/sites-available/dexo.conf
#   sudo rm -f /etc/nginx/sites-enabled/default   # removes conflicting catch-all
#   sudo ln -sf /etc/nginx/sites-available/dexo.conf /etc/nginx/sites-enabled/dexo.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then start tunnel:
#   ngrok http 80 --log stdout
#
# Access pattern:
#   /dexo              → Platform Web   (:3001)
#   /dexo/admin        → Platform Admin (:3002)
#   /dexo/api          → API            (:4000)  — nginx strips /dexo prefix
#   /dexo/docs         → Swagger UI     (:4000/api/docs)
#   /dexo/tenant       → Tenant Website (:4005)
#   /dexo/tenant-admin → Tenant Admin   (:4006)
#   /dexo/app          → Tenant App     (:4007)
#
# Tenant selection through tunnel (no subdomains on free ngrok):
#   https://<id>.ngrok-free.app/dexo/app?tenant=vrfitness
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    # ------------------------------------------------------------------
    # API — strip /dexo prefix so NestJS sees /api/... as expected
    # ------------------------------------------------------------------
    location /dexo/api {
        rewrite ^/dexo(/api.*) $1 break;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # Direct /api route — for browser-side JS calls (no basePath prefix).
    # When NEXT_PUBLIC_API_URL is empty the API client uses relative /api paths;
    # those land here and get forwarded straight to NestJS.
    location /api {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # ------------------------------------------------------------------
    # Swagger — rewrite to the actual NestJS docs path
    # ------------------------------------------------------------------
    location /dexo/docs {
        rewrite ^/dexo/docs(/.*)?$ /api/docs$1 break;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # Next.js apps — basePath is set in each app so the full /dexo/...
    # path is forwarded as-is and Next.js handles it correctly.
    # More-specific locations win over /dexo (longest prefix match).
    # ------------------------------------------------------------------
    location /dexo/tenant-admin {
        proxy_pass         http://127.0.0.1:4006;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo/tenant {
        proxy_pass         http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo/admin {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo/app {
        proxy_pass         http://127.0.0.1:4007;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # Root redirect → Platform Web
    location = / {
        return 302 /dexo;
    }
}
