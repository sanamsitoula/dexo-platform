# =============================================================================
# Dexo — Path-based nginx config (ngrok / single-URL demo)
#
# Use this when you need ONE public URL for all apps (e.g. free ngrok).
# Platform Web, Platform Admin, and Tenant Website set their basePath from
# ENABLE_PATH_ROUTING=true (see their next.config.js), matching their
# /dexo/... prefix exactly, so those are forwarded as-is, no rewrite needed.
# tenant-admin and tenant-app now ALWAYS build with a FIXED Next.js basePath
# ('/admin' and '/portal' respectively — see apps/tenant-admin/next.config.js,
# apps/tenant-app/next.config.js) independent of ENABLE_PATH_ROUTING, so
# their /dexo/tadmin and /dexo/portal demo prefixes are rewritten down to
# that fixed basePath before proxying.
#
# Install:
#   sudo cp deploy/nginx/dexo-ngrok.conf /etc/nginx/sites-available/dexo.conf
#   sudo rm -f /etc/nginx/sites-enabled/default   # removes conflicting catch-all
#   sudo ln -sf /etc/nginx/sites-available/dexo.conf /etc/nginx/sites-enabled/dexo.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then start tunnel:
#   ngrok http 80 --log stdout
#
# Access pattern:
#   /dexo         → Platform Web   (:3001)
#   /dexo/admin   → Platform Admin (:3002)
#   /dexo/api     → API            (:4000)  — nginx strips /dexo prefix
#   /dexo/docs    → Swagger UI     (:4000/api/docs)
#   /dexo/tenant  → Tenant Website (:4005)
#   /dexo/tadmin  → Tenant Admin   (:4006/admin — rewritten to the app's basePath)
#   /dexo/portal  → Tenant App     (:4007/portal — rewritten to the app's basePath)
#
# Tenant selection through tunnel (no subdomains on free ngrok):
#   https://<id>.ngrok-free.app/dexo/portal?tenant=vrfitness
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    # ------------------------------------------------------------------
    # API — strip /dexo prefix so NestJS sees /api/... as expected
    # ------------------------------------------------------------------
    location /dexo/api {
        rewrite ^/dexo(/api.*) $1 break;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # Direct /api route — for browser-side JS calls (no basePath prefix).
    # When NEXT_PUBLIC_API_URL is empty the API client uses relative /api paths;
    # those land here and get forwarded straight to NestJS.
    location /api {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # ------------------------------------------------------------------
    # Swagger — rewrite to the actual NestJS docs path
    # ------------------------------------------------------------------
    location /dexo/docs {
        rewrite ^/dexo/docs(/.*)?$ /api/docs$1 break;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # Next.js apps. Platform Web/Admin have no basePath, so /dexo/... is
    # stripped entirely. tenant-admin/tenant-app have a FIXED basePath
    # ('/admin', '/portal') baked in at build time, so /dexo/tadmin and
    # /dexo/portal are rewritten to that basePath before proxying.
    # More-specific locations win over /dexo (longest prefix match).
    # ------------------------------------------------------------------
    location /dexo/tadmin {
        rewrite ^/dexo/tadmin(/.*)?$ /admin$1 break;
        proxy_pass         http://127.0.0.1:4006;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo/tenant {
        proxy_pass         http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo/admin {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo/portal {
        rewrite ^/dexo/portal(/.*)?$ /portal$1 break;
        proxy_pass         http://127.0.0.1:4007;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /dexo {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # Root redirect → Platform Web
    location = / {
        return 302 /dexo;
    }
}
