name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Type-check
        run: npm run type-check
      - name: Lint
        run: npm run lint
        continue-on-error: true # lint warnings must not block until baseline is clean

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build all workspaces
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  migrations:
    name: Prisma migrations check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dexo
          POSTGRES_PASSWORD: dexo
          POSTGRES_DB: dexo_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U dexo" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply migrations to clean database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://dexo:dexo@localhost:5432/dexo_ci
